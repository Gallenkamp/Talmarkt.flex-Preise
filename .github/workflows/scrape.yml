name: WSW Preise scrapen

on:
  schedule:
    # Alle 12 Stunden: 06:00 und 18:00 UTC (08:00 und 20:00 MESZ)
    - cron: '0 6,18 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: jq installieren
        run: sudo apt-get install -y jq

      - name: Scraper ausführen
        run: |
          chmod +x scripts/scrape.sh
          bash scripts/scrape.sh

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Keine neuen Daten."
          else
            git commit -m "Preisdaten aktualisiert: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
